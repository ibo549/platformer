name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Build web bundle
        run: python3 build-web.sh

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Debug token via curl
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== verify ==="
          curl -sS "https://api.cloudflare.com/client/v4/user/tokens/verify" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 300; echo
          echo "=== project read ==="
          curl -sS "https://api.cloudflare.com/client/v4/accounts/d22d4830228d45415d221689995d6e29/pages/projects/chibi-runner" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 300; echo

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: d22d4830228d45415d221689995d6e29
        run: wrangler pages deploy web --project-name=chibi-runner --branch=main --commit-dirty=true
